<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wdth,wght@0,75..100,722;1,75..100,722&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Weather</title>
</head>
<body>
    <div class="parent">
    <div class="background">
        <div class="nav">
            <nav>
                <h1>
                    Weather
                </h1>
                <div class="search-wrapper">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search city...">
        <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
</div>
                </div>
            </nav>
        </div>
       <div class="dashboard-wrapper">
    
    <div class="header-section">
        <div class="location-box">
            <h1 id="city-name">London</h1>
            <p id="local-time">22 April 2026 | 17:53</p>
        </div>
        <div class="search-area">
            <input type="text" id="city-input" placeholder="Search City...">
            <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="weather-grid">
        
        <div class="glass-card main-stats">
            <span class="card-label">Current Condition</span>
            <div class="temp-row">
                <img id="main-icon" src="" alt="Weather">
                <h2 id="main-temp">--°C</h2>
            </div>
            <p id="weather-desc">Partly Cloudy</p>
            <div class="feels-like">
                Real Feel: <span id="feels-val">--°C</span>
            </div>
        </div>

        <div class="info-side">
            <div class="glass-card mini-card">
                <div class="icon-text">
                    <p>Wind Speed</p>
                    <h3 id="wind-val">-- km/h</h3>
                </div>
                <div class="icon-text">
                    <p>Direction</p>
                    <h3 id="wind-dir">--</h3>
                </div>
            </div>

            <div class="glass-card mini-card">
                <div class="icon-text">
                    <p>Humidity</p>
                    <h3 id="humidity-val">--%</h3>
                </div>
                <div class="icon-text">
                    <p>UV Index</p>
                    <h3 id="uv-val">--</h3>
                </div>
            </div>
        </div>

    </div>

    <div class="glass-card bottom-strip">
        <div class="stat-item">
            <p>Visibility</p>
            <span id="vis-val">-- km</span>
        </div>
        <div class="stat-item">
            <p>Pressure</p>
            <span id="press-val">-- mb</span>
        </div>
        <div class="stat-item">
            <p>Cloud Cover</p>
            <span id="cloud-val">--%</span>
        </div>
    </div>
</div>
    </div>
        </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
